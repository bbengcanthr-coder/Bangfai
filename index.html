<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroBangFai Dynamics | ระบบประเมินเพดานบิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0A84FF;
            --text-main: #1C1C1E;
            --text-sub: #8E8E93;
            --bg-color: #FFFFFF;
            --card-bg: #F2F2F7;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.4;
            /* ควบคุมไม่ให้ฟอนต์ห่างเกินไป */
            letter-spacing: 0.2px; 
        }

        /* กล่องหลักที่จำกัดความกว้างให้พอดีกับโทรศัพท์มือถือ */
        .mobile-container {
            width: 100%;
            max-width: 430px; 
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 300;
            margin: 0;
        }

        .control-panel {
            background-color: var(--bg-color);
            border: 1px solid #E5E5EA;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* ตกแต่งแถบเลื่อน (Slider) ให้ดูไฮเทค */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(10, 132, 255, 0.4);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #E5E5EA;
            border-radius: 4px;
        }

        .input-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-sub);
        }

        .input-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .result-panel {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .result-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-sub);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .height-display {
            font-size: 48px;
            font-weight: 600;
            margin: 8px 0;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .height-unit {
            font-size: 16px;
            color: var(--text-sub);
            font-weight: 400;
        }

        .comparison-box {
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-main);
            border: 1px solid #E5E5EA;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        footer {
            text-align: center;
            margin-top: 32px;
            font-size: 11px;
            color: #C7C7CC;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <header>
            <h1>AeroBangFai Dynamics</h1>
            <p class="subtitle">ระบบประเมินประสิทธิภาพและเพดานบินทางวิศวกรรม</p>
        </header>

        <div class="control-panel">
            <label for="powderMass">กำหนดปริมาณประจุเชื้อเพลิง (ดินปืน)</label>
            <input type="range" id="powderMass" min="1" max="120" value="10" step="1">
            
            <div class="input-display">
                <span>ปริมาตรมวล:</span>
                <div>
                    <span class="input-value" id="massValue">10</span>
                    <span> กิโลกรัม</span>
                </div>
            </div>
        </div>

        <div class="result-panel">
            <div class="result-title">ประเมินเพดานบินสูงสุด (Apogee)</div>
            <div class="height-display">
                <span id="heightValue">320</span><span class="height-unit"> เมตร</span>
            </div>
            
            <div class="comparison-box">
                <span id="iconDisplay">🗼</span>
                <span id="comparisonText">เทียบเท่าความสูง: หอไอเฟล</span>
            </div>
        </div>

        <footer>
            *แบบจำลองนี้อ้างอิงสัดส่วนแรงขับตามทฤษฎีเบื้องต้นเพื่อการศึกษาเท่านั้น<br>ตัวแปรทางอากาศพลศาสตร์และน้ำหนักโครงสร้างถูกปรับให้เข้าใจง่าย
        </footer>
    </div>

    <script>
        // ดึง Element จาก HTML มาใช้งาน
        const slider = document.getElementById('powderMass');
        const massValue = document.getElementById('massValue');
        const heightValue = document.getElementById('heightValue');
        const comparisonText = document.getElementById('comparisonText');
        const iconDisplay = document.getElementById('iconDisplay');

        // ฟังก์ชันคำนวณความสูง (ดัดแปลงสมการให้ดูสมจริงแบบจำลองฟิสิกส์ง่ายๆ)
        function calculateHeight(kg) {
            // สมมติฐาน: เชื้อเพลิง 1 กิโลกรัม ดันขึ้นไปได้ระดับหนึ่ง โดยมีแรงต้านอากาศเพิ่มขึ้นแบบไม่เป็นเชิงเส้น
            let rawHeight = (kg * 45) - (Math.pow(kg, 1.25)); 
            return Math.max(0, Math.round(rawHeight));
        }

        // ฟังก์ชันเปรียบเทียบสิ่งก่อสร้าง/ระดับความสูง
        function updateComparison(height) {
            let text = "";
            let icon = "";

            if (height < 50) {
                text = "ต้นไม้ใหญ่ / เสาไฟฟ้าแรงสูง"; icon = "🌳";
            } else if (height < 150) {
                text = "ตึกระฟ้าขนาดกลาง (30-40 ชั้น)"; icon = "🏢";
            } else if (height < 350) {
                text = "หอไอเฟล (ปารีส)"; icon = "🗼";
            } else if (height < 600) {
                text = "ตึกไทเป 101"; icon = "🏙️";
            } else if (height < 900) {
                text = "ตึกเบิร์จคาลิฟา (สูงที่สุดในโลก)"; icon = "🏙️";
            } else if (height < 1500) {
                text = "ยอดเขาดอยอินทนนท์ (ระดับน้ำทะเล)"; icon = "⛰️";
            } else if (height < 3000) {
                text = "ระดับฐานเมฆชั้นต่ำ"; icon = "☁️";
            } else {
                text = "ระดับเพดานบินเครื่องบินพาณิชย์ขนาดเล็ก"; icon = "✈️";
            }

            comparisonText.innerText = "เทียบเท่า: " + text;
            iconDisplay.innerText = icon;
        }

        // ฟังก์ชันอัปเดตหน้าจอเมื่อผู้ใช้เลื่อน Slider
        function updateUI() {
            let kg = parseFloat(slider.value);
            massValue.innerText = kg;
            
            let estimatedHeight = calculateHeight(kg);
            // ใส่ลูกน้ำ (Comma) ให้ตัวเลขดูเป็นมืออาชีพ
            heightValue.innerText = estimatedHeight.toLocaleString();
            
            updateComparison(estimatedHeight);
        }

        // ดักจับเหตุการณ์เมื่อมีการเลื่อน Slider
        slider.addEventListener('input', updateUI);

        // รันครั้งแรกตอนเปิดหน้าเว็บ
        updateUI();
    </script>
</body>
</html>
